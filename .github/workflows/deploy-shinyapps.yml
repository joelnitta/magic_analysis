name: Deploy Shiny app to shinyapps.io

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # Every day at 04:00 UTC

jobs:
  deploy-shiny:
    runs-on: ubuntu-latest
    env:
      SEVENTEENLANDS_USERNAME: ${{ secrets.SEVENTEENLANDS_USERNAME }}
      SEVENTEENLANDS_PASSWORD: ${{ secrets.SEVENTEENLANDS_PASSWORD }}
      SHINYAPPS_ACCOUNT: joelnitta
      SHINYAPPS_SERVER: shinyapps.io
      SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
      SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: false

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libuv1-dev libcurl4-openssl-dev

      - name: Restore R dependencies from renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Install R quarto package
        run: Rscript -e "install.packages('quarto', repos = 'https://cloud.r-project.org')"

      - name: Build targets pipeline
        run: Rscript -e "targets::tar_make()"

      - name: Authorize and deploy app
        env:
          APPNAME: magic-dashboard
          ACCOUNT: joelnitta
          SERVER: shinyapps.io
        shell: Rscript {0}
        run: |
          app_files <- c(
            "app.R",
            "data/app/wins_losses.csv",
            "data/app/deck_color_counts.csv",
            "data/app/lands_set_averages.csv"
          )

          rsconnect::setAccountInfo(
            Sys.getenv("SHINYAPPS_ACCOUNT"),
            Sys.getenv("SHINYAPPS_TOKEN"),
            Sys.getenv("SHINYAPPS_SECRET")
          )

          rsconnect::deployApp(
            appDir = ".",
            appFiles = app_files,
            appName = Sys.getenv("APPNAME"),
            account = Sys.getenv("ACCOUNT"),
            server = Sys.getenv("SERVER")
          )
