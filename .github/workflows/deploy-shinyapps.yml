name: Deploy Shiny app to shinyapps.io

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # Every day at 04:00 UTC

jobs:
  deploy-shiny:
    runs-on: ubuntu-latest
    env:
      SEVENTEENLANDS_USERNAME: ${{ secrets.SEVENTEENLANDS_USERNAME }}
      SEVENTEENLANDS_PASSWORD: ${{ secrets.SEVENTEENLANDS_PASSWORD }}
      SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
      SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
      SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c(
            'targets',
            'tarchetypes',
            'httr2',
            'jsonlite',
            'dplyr',
            'readr',
            'ggplot2',
            'scales',
            'stringr',
            'tidyr',
            'tibble',
            'rlang',
            'shiny',
            'rsconnect'
          ), repos = 'https://cloud.r-project.org')"

      - name: Build targets pipeline
        run: Rscript -e "targets::tar_make()"

      - name: Deploy to shinyapps.io
        run: |
          Rscript -e "rsconnect::setAccountInfo(name = Sys.getenv('SHINYAPPS_NAME'), token = Sys.getenv('SHINYAPPS_TOKEN'), secret = Sys.getenv('SHINYAPPS_SECRET'))"
          Rscript deploy.R
