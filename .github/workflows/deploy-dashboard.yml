name: Deploy dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SEVENTEENLANDS_USERNAME: ${{ secrets.SEVENTEENLANDS_USERNAME }}
      SEVENTEENLANDS_PASSWORD: ${{ secrets.SEVENTEENLANDS_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: false

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libuv1-dev

      - name: Restore R dependencies from renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Build targets pipeline
        run: Rscript -e "targets::tar_make()"

      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          cp dashboard.html _site/
          cp -R working _site/working

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
